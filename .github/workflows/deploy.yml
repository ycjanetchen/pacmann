name: Deploy Pac-Man to GitHub Pages

on:
  push:
    branches: [main, master, claude/pacman-game-react-pITHj]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pacman-game/package-lock.json

      - name: Install dependencies
        working-directory: pacman-game
        run: npm ci

      - name: Build
        working-directory: pacman-game
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pacman-game/build
